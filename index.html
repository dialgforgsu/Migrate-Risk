<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Migration Risk &amp; Duration Estimator</title>
  <meta name="description" content="Estimate realistic timelines, downtime windows, rollback risk, and team hours for SQL Server / PostgreSQL migrations." />

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#0066cc',
            success: '#28a745',
            warning: '#ffc107',
            risk: '#dc3545',
            neutral: '#6c757d',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- React 18 + Babel (no build step) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Recharts (needs prop-types) -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html { scroll-behavior: smooth; }
    body { background: #f4f6f9; }
    /* Range slider styling (cross-browser) */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 9999px;
      background: #e2e8f0;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 9999px;
      background: #0066cc;
      cursor: pointer;
      border: 3px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: transform .1s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 9999px;
      background: #0066cc; cursor: pointer; border: 3px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    input[type="range"]:focus-visible::-webkit-slider-thumb { outline: 3px solid #99c2ec; }
    .metric-pop { animation: pop .25s ease; }
    @keyframes pop { 0% { transform: scale(.96); } 60% { transform: scale(1.02); } 100% { transform: scale(1); } }
    .fade-in { animation: fade .3s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;
    const {
      ResponsiveContainer, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid,
      Cell, ReferenceLine, Legend
    } = Recharts;

    /* ----------------------------------------------------------------
       FORMULAS  (utils/formulas.js)
    ---------------------------------------------------------------- */

    const THROUGHPUT = { online: 50, offline: 200, shadow: 150 }; // MB/s

    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
    function round(n, d = 0) { const f = 10 ** d; return Math.round(n * f) / f; }

    function computeResults(inputs) {
      const {
        tableSize, dailyReads, dailyWrites, columnCount, indexCount,
        downtimeTolerance, migrationStrategy, targetDB, validateData,
      } = inputs;

      // --- Preparation overhead: 5–15 min scaled by indexes + constraints ---
      const prepOverhead = clamp(5 + indexCount * 0.6 + columnCount * 0.05, 5, 15);

      // --- Migration duration ---
      // table_size (GB) -> MB ; throughput MB/s -> seconds -> minutes
      const throughput = THROUGHPUT[migrationStrategy] || 50;
      const transferMinutes = (tableSize * 1024) / throughput / 60;
      let migrationTime = transferMinutes + prepOverhead;

      // PostgreSQL: slightly heavier index rebuild on large tables (DB-specific nuance)
      if (targetDB === 'postgres') migrationTime *= 1.08;
      migrationTime = round(migrationTime, 1);

      // --- Data validation ---
      let dataValidationTime = validateData
        ? round(tableSize / 100 + columnCount * 2, 1)
        : 5;

      // --- Downtime window ---
      let downtimeWindow;
      if (migrationStrategy === 'offline') {
        downtimeWindow = round(migrationTime + dataValidationTime + 10, 1);
      } else if (migrationStrategy === 'online') {
        downtimeWindow = 5;
      } else {
        downtimeWindow = 10; // shadow
      }

      // --- Prep time (in days) heuristic for risk scoring ---
      const daysPrepTime = clamp(1 + tableSize / 200 + indexCount / 10, 1, 10);

      // --- Rollback risk (0–100, lower = better) ---
      let risk = 40;
      risk += (tableSize / 100) * 2;
      risk -= downtimeWindow * 0.5;
      risk += (dailyWrites / 1000) * 1;
      risk -= daysPrepTime * 2;
      if (migrationStrategy === 'shadow') risk -= 15;
      if (migrationStrategy === 'online') risk -= 10;
      const rollbackRisk = clamp(round(risk), 0, 100);

      // --- Team hours ---
      let hours = 4;
      hours += tableSize / 100;
      hours += dailyWrites / 5000;
      hours += columnCount / 10;
      hours *= validateData ? 1.5 : 1;
      if (migrationStrategy === 'online') hours *= 1.2;
      if (migrationStrategy === 'offline') hours *= 0.8;
      const teamHoursNeeded = round(hours, 1);

      // --- Recommended strategy ---
      let recommendedStrategy, recommendedReason;
      if (tableSize > 100 && dailyWrites > 5000 && downtimeTolerance < 60) {
        recommendedStrategy = 'online';
        recommendedReason = 'Large, write-heavy table with a tight downtime budget — keep it serving traffic during the move.';
      } else if (tableSize < 20 && downtimeTolerance > 120) {
        recommendedStrategy = 'offline';
        recommendedReason = 'Small table and a generous maintenance window — the fastest path is a quick offline copy.';
      } else {
        recommendedStrategy = 'shadow';
        recommendedReason = 'A parallel shadow table balances speed and safety for your mix of size, load, and downtime tolerance.';
      }

      // --- Warnings / constraints ---
      const warnings = [];
      if (downtimeWindow > downtimeTolerance) {
        warnings.push({
          type: 'error',
          text: `Downtime window (${downtimeWindow} min) exceeds your tolerance (${downtimeTolerance} min) by ${round(downtimeWindow - downtimeTolerance, 1)} min.`,
        });
      }
      if (dailyWrites > 5000 && migrationStrategy !== 'online') {
        warnings.push({
          type: 'warn',
          text: `High write volume (${dailyWrites.toLocaleString()}/day) detected — an online migration is recommended to avoid a long lock.`,
        });
      }
      if (migrationStrategy !== recommendedStrategy) {
        warnings.push({
          type: 'warn',
          text: `Your selected strategy (${migrationStrategy}) differs from the recommended one (${recommendedStrategy}).`,
        });
      }
      if (tableSize > 200 && migrationStrategy === 'offline') {
        warnings.push({
          type: 'warn',
          text: `Offline migration on a ${tableSize} GB table means a long blocking window — consider shadow or online.`,
        });
      }
      if (rollbackRisk <= 30) {
        warnings.push({ type: 'ok', text: 'Low rollback risk — this migration is well-scoped.' });
      } else if (rollbackRisk >= 71) {
        warnings.push({ type: 'error', text: 'High rollback risk — add prep time, more downtime, or switch to a shadow strategy.' });
      }
      if (!validateData) {
        warnings.push({ type: 'warn', text: 'Data validation is off — only a quick sanity check will run. Re-enable for production cutovers.' });
      }

      return {
        estimatedDuration: migrationTime,
        dataValidationTime,
        downtimeWindow,
        rollbackRisk,
        teamHoursNeeded,
        prepOverhead: round(prepOverhead, 1),
        recommendedStrategy,
        recommendedReason,
        warnings,
      };
    }

    /* ----------------------------------------------------------------
       PRESETS
    ---------------------------------------------------------------- */
    const PRESETS = {
      'Small App DB': {
        tableSize: 5, dailyReads: 5000, dailyWrites: 100, columnCount: 15,
        indexCount: 3, downtimeTolerance: 60, migrationStrategy: 'offline',
        targetDB: 'sqlserver', validateData: true,
      },
      'Medium E-Commerce': {
        tableSize: 50, dailyReads: 100000, dailyWrites: 5000, columnCount: 25,
        indexCount: 8, downtimeTolerance: 30, migrationStrategy: 'online',
        targetDB: 'sqlserver', validateData: true,
      },
      'Enterprise Data Warehouse': {
        tableSize: 500, dailyReads: 1000000, dailyWrites: 50000, columnCount: 80,
        indexCount: 15, downtimeTolerance: 240, migrationStrategy: 'shadow',
        targetDB: 'postgres', validateData: true,
      },
      'Microservices Migration': {
        tableSize: 20, dailyReads: 50000, dailyWrites: 2000, columnCount: 12,
        indexCount: 4, downtimeTolerance: 15, migrationStrategy: 'online',
        targetDB: 'postgres', validateData: false,
      },
    };

    const DEFAULT_INPUTS = {
      tableSize: 50, dailyReads: 10000, dailyWrites: 500, columnCount: 25,
      indexCount: 5, downtimeTolerance: 120, migrationStrategy: 'online',
      targetDB: 'sqlserver', validateData: true,
    };

    /* ----------------------------------------------------------------
       URL STATE  (hash-encoded for share links)
    ---------------------------------------------------------------- */
    const KEY_ORDER = ['tableSize','dailyReads','dailyWrites','columnCount','indexCount','downtimeTolerance','migrationStrategy','targetDB','validateData'];

    function encodeState(inputs) {
      const p = new URLSearchParams();
      KEY_ORDER.forEach((k) => p.set(k, String(inputs[k])));
      return p.toString();
    }
    function decodeState() {
      try {
        const hash = window.location.hash.replace(/^#/, '');
        if (!hash) return null;
        const p = new URLSearchParams(hash);
        const out = { ...DEFAULT_INPUTS };
        const numeric = ['tableSize','dailyReads','dailyWrites','columnCount','indexCount','downtimeTolerance'];
        numeric.forEach((k) => { if (p.has(k)) out[k] = Number(p.get(k)); });
        if (p.has('migrationStrategy')) out.migrationStrategy = p.get('migrationStrategy');
        if (p.has('targetDB')) out.targetDB = p.get('targetDB');
        if (p.has('validateData')) out.validateData = p.get('validateData') === 'true';
        return out;
      } catch (e) { return null; }
    }

    /* ----------------------------------------------------------------
       SMALL UI HELPERS
    ---------------------------------------------------------------- */
    function fmt(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'k';
      return String(n);
    }
    function minutesPretty(m) {
      if (m < 60) return `${m} min`;
      const h = Math.floor(m / 60);
      const rem = round(m - h * 60);
      return rem ? `${h}h ${rem}m` : `${h}h`;
    }
    function riskColor(score) {
      if (score <= 30) return { hex: '#28a745', label: 'Low', bg: 'bg-success/10', text: 'text-success', ring: 'ring-success/30' };
      if (score <= 70) return { hex: '#d39e00', label: 'Moderate', bg: 'bg-warning/10', text: 'text-yellow-700', ring: 'ring-warning/40' };
      return { hex: '#dc3545', label: 'High', bg: 'bg-risk/10', text: 'text-risk', ring: 'ring-risk/30' };
    }

    function Slider({ label, value, min, max, step = 1, onChange, format, suffix, hint }) {
      const display = format ? format(value) : value;
      return (
        <div className="mb-5">
          <div className="flex items-baseline justify-between mb-1.5">
            <label className="text-sm font-medium text-slate-700">{label}</label>
            <span className="text-sm font-semibold text-brand tabular-nums">
              {display}{suffix ? ` ${suffix}` : ''}
            </span>
          </div>
          <input
            type="range" min={min} max={max} step={step} value={value}
            onChange={(e) => onChange(Number(e.target.value))}
            aria-label={label}
            aria-valuetext={`${display}${suffix ? ' ' + suffix : ''}`}
          />
          {hint && <p className="text-xs text-slate-400 mt-1">{hint}</p>}
        </div>
      );
    }

    function Segmented({ label, value, options, onChange, name }) {
      return (
        <div className="mb-5">
          <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
          <div role="radiogroup" aria-label={label} className="grid gap-1.5 rounded-lg bg-slate-100 p-1"
               style={{ gridTemplateColumns: `repeat(${options.length}, minmax(0,1fr))` }}>
            {options.map((opt) => {
              const active = value === opt.value;
              return (
                <button
                  key={opt.value}
                  type="button"
                  role="radio"
                  aria-checked={active}
                  onClick={() => onChange(opt.value)}
                  className={`px-2 py-1.5 text-sm font-medium rounded-md transition-all ${
                    active ? 'bg-white text-brand shadow-sm' : 'text-slate-500 hover:text-slate-700'
                  }`}
                >
                  {opt.label}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function Toggle({ label, checked, onChange, hint }) {
      return (
        <div className="mb-5 flex items-start justify-between">
          <div>
            <label className="text-sm font-medium text-slate-700">{label}</label>
            {hint && <p className="text-xs text-slate-400 mt-0.5">{hint}</p>}
          </div>
          <button
            type="button" role="switch" aria-checked={checked} aria-label={label}
            onClick={() => onChange(!checked)}
            className={`relative inline-flex h-6 w-11 flex-shrink-0 rounded-full transition-colors ${checked ? 'bg-brand' : 'bg-slate-300'}`}
          >
            <span className={`inline-block h-5 w-5 transform rounded-full bg-white shadow translate-y-0.5 transition-transform ${checked ? 'translate-x-5' : 'translate-x-0.5'}`} />
          </button>
        </div>
      );
    }

    function MetricCard({ label, value, unit, sub, accent }) {
      // re-trigger pop animation on value change
      const [k, setK] = useState(0);
      useEffect(() => { setK((x) => x + 1); }, [value]);
      return (
        <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <p className="text-xs font-medium uppercase tracking-wide text-slate-400">{label}</p>
          <p key={k} className={`metric-pop mt-1 text-2xl font-extrabold tabular-nums ${accent || 'text-slate-800'}`}>
            {value}{unit && <span className="ml-1 text-sm font-semibold text-slate-400">{unit}</span>}
          </p>
          {sub && <p className="mt-0.5 text-xs text-slate-400">{sub}</p>}
        </div>
      );
    }

    /* ----------------------------------------------------------------
       RISK GAUGE
    ---------------------------------------------------------------- */
    function RiskGauge({ score }) {
      const c = riskColor(score);
      const radius = 70, stroke = 14;
      const circ = Math.PI * radius; // half circle
      const pct = clamp(score, 0, 100) / 100;
      const dash = circ * pct;
      return (
        <div className="flex flex-col items-center">
          <svg width="180" height="110" viewBox="0 0 180 110" role="img" aria-label={`Rollback risk score ${score} of 100, ${c.label}`}>
            <path d="M 20 100 A 70 70 0 0 1 160 100" fill="none" stroke="#e2e8f0" strokeWidth={stroke} strokeLinecap="round" />
            <path
              d="M 20 100 A 70 70 0 0 1 160 100" fill="none" stroke={c.hex} strokeWidth={stroke} strokeLinecap="round"
              strokeDasharray={`${dash} ${circ}`}
              style={{ transition: 'stroke-dasharray .5s ease, stroke .3s ease' }}
            />
          </svg>
          <div className="-mt-12 text-center">
            <div className="text-3xl font-extrabold tabular-nums" style={{ color: c.hex }}>{score}</div>
            <div className="text-xs font-semibold uppercase tracking-wide" style={{ color: c.hex }}>{c.label} risk</div>
          </div>
        </div>
      );
    }

    /* ----------------------------------------------------------------
       MAIN APP
    ---------------------------------------------------------------- */
    function App() {
      const [inputs, setInputs] = useState(() => decodeState() || DEFAULT_INPUTS);
      const [activePreset, setActivePreset] = useState(null);
      const [copied, setCopied] = useState('');

      const results = useMemo(() => computeResults(inputs), [inputs]);

      // keep URL hash in sync (debounced via rAF-ish microtask)
      useEffect(() => {
        const id = setTimeout(() => {
          const enc = encodeState(inputs);
          window.history.replaceState(null, '', '#' + enc);
        }, 200);
        return () => clearTimeout(id);
      }, [inputs]);

      const set = useCallback((key, value) => {
        setInputs((prev) => ({ ...prev, [key]: value }));
        setActivePreset(null);
      }, []);

      const applyPreset = useCallback((name) => {
        setInputs({ ...DEFAULT_INPUTS, ...PRESETS[name] });
        setActivePreset(name);
      }, []);

      const reset = useCallback(() => {
        setInputs(DEFAULT_INPUTS);
        setActivePreset(null);
      }, []);

      // ---- share helpers ----
      const flashCopied = (which) => { setCopied(which); setTimeout(() => setCopied(''), 1800); };

      const copyLink = async () => {
        const url = window.location.origin + window.location.pathname + '#' + encodeState(inputs);
        try { await navigator.clipboard.writeText(url); } catch (e) {}
        flashCopied('link');
      };

      const shareText = `I estimated a ${inputs.migrationStrategy} migration for a ${inputs.tableSize} GB table: ~${minutesPretty(results.estimatedDuration)} duration, ${results.downtimeWindow} min downtime, ${riskColor(results.rollbackRisk).label.toLowerCase()} rollback risk (${results.rollbackRisk}/100).`;

      const noteText =
`MIGRATION ESTIMATE
==================================
Target DB:        ${inputs.targetDB === 'sqlserver' ? 'SQL Server' : 'PostgreSQL'}
Strategy:         ${inputs.migrationStrategy}
Table size:       ${inputs.tableSize} GB
Daily reads:      ${inputs.dailyReads.toLocaleString()}
Daily writes:     ${inputs.dailyWrites.toLocaleString()}
Columns / Indexes:${inputs.columnCount} / ${inputs.indexCount}
Downtime budget:  ${inputs.downtimeTolerance} min
Validate data:    ${inputs.validateData ? 'yes' : 'no'}
----------------------------------
Est. migration:   ${results.estimatedDuration} min (${minutesPretty(results.estimatedDuration)})
Validation:       ${results.dataValidationTime} min
Downtime window:  ${results.downtimeWindow} min
Rollback risk:    ${results.rollbackRisk}/100 (${riskColor(results.rollbackRisk).label})
Team hours:       ${results.teamHoursNeeded} h
----------------------------------
Recommended:      ${results.recommendedStrategy}
Reason:           ${results.recommendedReason}
==================================
Estimated with the Redgate Migration Risk & Duration Estimator.`;

      const copyText = async (text, which) => {
        try { await navigator.clipboard.writeText(text); } catch (e) {}
        flashCopied(which);
      };

      // ---- chart data ----
      const chartData = useMemo(() => ([
        { name: 'Prep', minutes: results.prepOverhead, fill: '#6c757d' },
        { name: 'Migration', minutes: round(results.estimatedDuration - results.prepOverhead, 1), fill: '#0066cc' },
        { name: 'Validation', minutes: results.dataValidationTime, fill: '#17a2b8' },
        { name: 'Downtime', minutes: results.downtimeWindow, fill: riskColor(results.rollbackRisk).hex },
      ]), [results]);

      const overTolerance = results.downtimeWindow > inputs.downtimeTolerance;
      const rc = riskColor(results.rollbackRisk);

      const strategyOptions = [
        { value: 'online', label: 'Online' },
        { value: 'offline', label: 'Offline' },
        { value: 'shadow', label: 'Shadow' },
      ];

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-white border-b border-slate-200">
            <div className="mx-auto max-w-6xl px-4 sm:px-6 py-5 flex flex-wrap items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-brand text-white font-extrabold text-lg">M</div>
                <div>
                  <h1 className="text-lg sm:text-xl font-extrabold text-slate-800 leading-tight">Migration Risk &amp; Duration Estimator</h1>
                  <p className="text-xs text-slate-500">Plan SQL Server &amp; PostgreSQL migrations with confidence — not guesswork.</p>
                </div>
              </div>
              <button onClick={reset} className="text-sm font-medium text-slate-500 hover:text-brand transition-colors">
                Reset
              </button>
            </div>
          </header>

          <main className="mx-auto max-w-6xl px-4 sm:px-6 py-6">
            {/* Presets */}
            <section className="mb-6">
              <h2 className="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Quick scenarios</h2>
              <div className="flex flex-wrap gap-2">
                {Object.keys(PRESETS).map((name) => (
                  <button
                    key={name}
                    onClick={() => applyPreset(name)}
                    className={`rounded-full border px-3.5 py-1.5 text-sm font-medium transition-all ${
                      activePreset === name
                        ? 'border-brand bg-brand text-white shadow-sm'
                        : 'border-slate-200 bg-white text-slate-600 hover:border-brand hover:text-brand'
                    }`}
                  >
                    {name}
                  </button>
                ))}
              </div>
            </section>

            <div className="grid gap-6 lg:grid-cols-[minmax(0,1fr)_minmax(0,1.25fr)]">
              {/* ---------------- INPUTS ---------------- */}
              <section className="rounded-2xl border border-slate-200 bg-white p-5 sm:p-6 shadow-sm h-fit">
                <h2 className="mb-4 text-base font-bold text-slate-800">Migration parameters</h2>

                <Slider label="Table size" value={inputs.tableSize} min={0} max={500} step={1}
                  onChange={(v) => set('tableSize', v)} suffix="GB"
                  hint="Total data volume to migrate." />

                <Slider label="Daily reads" value={inputs.dailyReads} min={0} max={1000000} step={1000}
                  onChange={(v) => set('dailyReads', v)} format={fmt} suffix="/day" />

                <Slider label="Daily writes" value={inputs.dailyWrites} min={0} max={100000} step={100}
                  onChange={(v) => set('dailyWrites', v)} format={fmt} suffix="/day"
                  hint="Higher write load increases rollback risk." />

                <Slider label="Column count" value={inputs.columnCount} min={1} max={100} step={1}
                  onChange={(v) => set('columnCount', v)} />

                <Slider label="Index count" value={inputs.indexCount} min={1} max={20} step={1}
                  onChange={(v) => set('indexCount', v)}
                  hint="More indexes = longer prep/rebuild." />

                <Slider label="Downtime tolerance" value={inputs.downtimeTolerance} min={0} max={480} step={5}
                  onChange={(v) => set('downtimeTolerance', v)} format={minutesPretty} />

                <Segmented label="Migration strategy" value={inputs.migrationStrategy}
                  options={strategyOptions} onChange={(v) => set('migrationStrategy', v)} />

                <Segmented label="Target database" value={inputs.targetDB}
                  options={[{ value: 'sqlserver', label: 'SQL Server' }, { value: 'postgres', label: 'PostgreSQL' }]}
                  onChange={(v) => set('targetDB', v)} />

                <Toggle label="Validate data after migration" checked={inputs.validateData}
                  onChange={(v) => set('validateData', v)}
                  hint="Row counts, checksums & schema parity checks." />
              </section>

              {/* ---------------- RESULTS ---------------- */}
              <section className="space-y-5">
                {/* Metric cards */}
                <div className="grid grid-cols-2 gap-3 sm:grid-cols-3">
                  <MetricCard label="Migration time" value={results.estimatedDuration} unit="min"
                    sub={minutesPretty(results.estimatedDuration)} accent="text-brand" />
                  <MetricCard label="Validation" value={results.dataValidationTime} unit="min" />
                  <MetricCard label="Downtime window" value={results.downtimeWindow} unit="min"
                    accent={overTolerance ? 'text-risk' : 'text-slate-800'}
                    sub={overTolerance ? 'over tolerance' : 'within budget'} />
                  <MetricCard label="Team hours" value={results.teamHoursNeeded} unit="h" />
                  <MetricCard label="Prep overhead" value={results.prepOverhead} unit="min" />
                  <div className="rounded-xl border border-slate-200 bg-white p-4 shadow-sm flex items-center justify-center">
                    <div className="text-center">
                      <p className="text-xs font-medium uppercase tracking-wide text-slate-400 mb-1">Rollback risk</p>
                      <span className={`inline-block rounded-full px-3 py-1 text-lg font-extrabold tabular-nums ${rc.bg} ${rc.text}`}>
                        {results.rollbackRisk}<span className="text-xs font-semibold">/100</span>
                      </span>
                    </div>
                  </div>
                </div>

                {/* Recommendation */}
                <div className="rounded-2xl border border-brand/20 bg-brand/5 p-5 fade-in">
                  <div className="flex items-start gap-3">
                    <div className="mt-0.5 flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full bg-brand text-white text-sm font-bold">★</div>
                    <div>
                      <p className="text-sm font-bold text-slate-800">
                        Recommended strategy: <span className="capitalize text-brand">{results.recommendedStrategy}</span>
                      </p>
                      <p className="mt-1 text-sm text-slate-600">{results.recommendedReason}</p>
                    </div>
                  </div>
                </div>

                {/* Gauge + Chart */}
                <div className="grid gap-4 sm:grid-cols-[auto_1fr] items-center rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                  <RiskGauge score={results.rollbackRisk} />
                  <div className="h-48 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartData} margin={{ top: 8, right: 8, left: -16, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eef2f7" />
                        <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#64748b' }} axisLine={false} tickLine={false} />
                        <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} axisLine={false} tickLine={false} width={36}
                          label={{ value: 'min', angle: -90, position: 'insideLeft', fontSize: 10, fill: '#94a3b8' }} />
                        <Tooltip
                          formatter={(v) => [`${v} min`, 'Duration']}
                          contentStyle={{ borderRadius: 8, border: '1px solid #e2e8f0', fontSize: 12 }} />
                        <ReferenceLine y={inputs.downtimeTolerance} stroke="#dc3545" strokeDasharray="4 4"
                          label={{ value: 'tolerance', position: 'right', fontSize: 10, fill: '#dc3545' }} />
                        <Bar dataKey="minutes" radius={[5, 5, 0, 0]}>
                          {chartData.map((d, i) => <Cell key={i} fill={d.fill} />)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                {/* Warnings */}
                {results.warnings.length > 0 && (
                  <div className="space-y-2">
                    {results.warnings.map((w, i) => {
                      const styles = {
                        error: 'border-risk/30 bg-risk/5 text-risk',
                        warn: 'border-warning/40 bg-warning/10 text-yellow-700',
                        ok: 'border-success/30 bg-success/10 text-success',
                      }[w.type];
                      const icon = { error: '⚠️', warn: '⚠️', ok: '✅' }[w.type];
                      return (
                        <div key={i} className={`flex items-start gap-2 rounded-lg border px-3.5 py-2.5 text-sm font-medium ${styles}`}>
                          <span aria-hidden="true">{icon}</span>
                          <span>{w.text}</span>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Share */}
                <div className="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                  <h3 className="mb-3 text-sm font-bold text-slate-800">Share this estimate</h3>
                  <div className="flex flex-wrap gap-2">
                    <button onClick={copyLink}
                      className="rounded-lg bg-brand px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand/90 transition-colors">
                      {copied === 'link' ? '✓ Link copied' : 'Copy share link'}
                    </button>
                    <button onClick={() => copyText(shareText, 'text')}
                      className="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:border-brand hover:text-brand transition-colors">
                      {copied === 'text' ? '✓ Copied' : 'Copy summary'}
                    </button>
                    <button onClick={() => copyText(noteText, 'note')}
                      className="rounded-lg border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-600 hover:border-brand hover:text-brand transition-colors">
                      {copied === 'note' ? '✓ Copied' : 'Export as note'}
                    </button>
                  </div>
                  <p className="mt-3 text-xs text-slate-400 leading-relaxed">{shareText}</p>
                </div>
              </section>
            </div>

            <footer className="mt-10 border-t border-slate-200 pt-5 text-center text-xs text-slate-400">
              Estimates are conservative planning figures, not guarantees. All calculations run locally in your browser — nothing is sent to a server.
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
