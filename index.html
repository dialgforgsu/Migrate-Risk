<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Will It Lock? — Schema Migration Risk</title>
  <meta name="description" content="Find out exactly what a DDL operation will do to your table — lock type, reads/writes blocked, table rewrite, estimated duration, and a safe alternative — for your specific engine and version." />

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

    .dark input[type="range"]::-moz-range-thumb { border-color: #1e293b; }

<body>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    /* ---------------- option tables ---------------- */
    const ENGINES = [
      { value: 'sqlserver', label: 'SQL Server' },
      { value: 'postgres', label: 'PostgreSQL' },
      { value: 'mysql', label: 'MySQL' },
    ];
    const VERSIONS = {
      postgres: ['16', '15', '14', '13', '12', '11', '10', '9.6'],
      mysql: ['8.0', '5.7'],
      sqlserver: ['2022', '2019', '2017', '2016'],
    };
    const OPERATIONS = [
      ['add_column_nullable', 'Add nullable column'],
      ['add_column_constant_default', 'Add column with constant default'],
      ['add_column_volatile_default', 'Add column with volatile default (now(), random()…)'],
      ['add_column_not_null', 'Add NOT NULL column'],
      ['create_index', 'Create index'],
      ['create_index_concurrent', 'Create index (concurrent / online)'],
      ['alter_column_type', 'Alter column type'],
      ['add_foreign_key', 'Add foreign key'],
      ['add_not_null_constraint', 'Add NOT NULL constraint'],
      ['drop_column', 'Drop column'],
      ['rename_column', 'Rename column'],
    ];

    const SEV = {
      safe:    { emoji: '🟢', label: 'Safe',    dot: '#1e7e34', card: 'border-success/30 bg-success/5 dark:border-success/40 dark:bg-success/10', text: 'text-success dark:text-green-400' },
      caution: { emoji: '🟡', label: 'Caution', dot: '#d39e00', card: 'border-warning/40 bg-warning/5 dark:border-warning/40 dark:bg-warning/10', text: 'text-yellow-700 dark:text-yellow-300' },
      danger:  { emoji: '🔴', label: 'Danger',  dot: '#dc3545', card: 'border-risk/40 bg-risk/5 dark:border-risk/40 dark:bg-risk/10',          text: 'text-risk dark:text-red-400' },
    };

    /* ---------------- helpers ---------------- */
    function fmtRows(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(n % 1e9 ? 1 : 0) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(n % 1e6 ? 1 : 0) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(n % 1e3 ? 1 : 0) + 'k';
      return String(n);
    }
    function fmtNum(n) {
      if (n >= 1000) return (n / 1000).toFixed(n % 1000 ? 1 : 0) + 'k';
      return String(n);
    }

    /* ---------------- chat generators ---------------- */
    const LOCK_DESCS = {
      'ACCESS EXCLUSIVE':
        'the strongest PostgreSQL lock — blocks everything, including plain SELECT, for the full duration of the operation',
      'ACCESS EXCLUSIVE (brief)':
        'the strongest PostgreSQL lock, but released the instant a catalog entry is written — the blocking window is milliseconds, never scaled by table size',
      'SHARE':
        'allows concurrent reads (SELECT) but blocks all writes (INSERT / UPDATE / DELETE) for the full duration of the index build',
      'SHARE ROW EXCLUSIVE':
        'allows SELECT but blocks all writes and other data-modification operations for the duration of the scan',
      'SHARE UPDATE EXCLUSIVE':
        'the lightest ALTER TABLE lock in PostgreSQL — only blocks other schema-change DDL, never DML reads or writes',
      'Sch-M':
        'a Schema Modification lock in SQL Server that blocks all access — reads and writes — until the operation completes',
      'Sch-M (brief)':
        'a Schema Modification lock in SQL Server, released the instant the catalog update finishes — typically under 100 ms regardless of table size',
      'S (shared)':
        'a Shared lock in SQL Server — other queries can read and write DML while the index builds; only DDL (schema changes) is blocked',
      'metadata-only':
        'no row-level lock at all — the change touches only the system catalog and completes near-instantly regardless of table size',
      'metadata + INPLACE rebuild':
        'InnoDB rebuilds the table in the background while reads and writes continue; brief metadata locks bookend the start and finish only',
      'metadata + COPY':
        'MySQL must copy the entire table; reads continue on the original copy but writes queue until the new copy is swapped in',
      'INPLACE, LOCK=NONE':
        'MySQL builds the index in-place with no DML lock — reads and writes continue throughout; only brief metadata locks bookend the operation',
    };

    function genLockExplanation(verdict, opLabel, engLabel, version) {
      const desc = LOCK_DESCS[verdict.lockType] || `a ${verdict.lockType} lock`;
      let t = `**Why "${verdict.lockType}"?**\n\n`;
      t += `${verdict.explanation}\n\n`;
      t += `The lock type (${verdict.lockType}) means: ${desc}.\n\n`;
      const bad = [];
      if (verdict.blocksReads)  bad.push('reads (SELECT)');
      if (verdict.blocksWrites) bad.push('writes (INSERT / UPDATE / DELETE)');
      if (verdict.rewritesTable) bad.push('a full rewrite of every physical row');
      if (bad.length) {
        t += `⚠️ This operation causes: ${bad.join(' + ')}.`;
      } else {
        t += `✅ No meaningful blocking of reads or writes — the lock is structural and brief, not duration-scaled.`;
      }
      if (verdict.citations?.length) {
        t += `\n\n**Sources**\n${verdict.citations.slice(0, 2).map(c => `• ${c}`).join('\n')}`;
      }
      return t;
    }

    function genSafeAlternative(verdict, tableSizeLabel) {
      if (verdict.safeAlternative) {
        const { title, steps, estLockLabel } = verdict.safeAlternative;
        let t = `**Safer approach: ${title}**\n\n`;
        steps.forEach((s, i) => { t += `${i + 1}. ${s}\n`; });
        if (estLockLabel) t += `\nLock impact with this approach: ${estLockLabel}\n`;
        t += `\nWith a ${tableSizeLabel} table, this avoids holding the lock during the heavy work — only the brief setup/swap steps block. The bulk of the time is lock-free.`;
        return t;
      }
      if (verdict.severity === 'safe') {
        let t = `**This operation is already safe.**\n\nIt acquires only a ${verdict.lockType}`;
        t += verdict.estDurationLabel === 'instant'
          ? ', which releases in milliseconds'
          : ` for approximately ${verdict.estDurationLabel}`;
        t += '. No safer alternative is needed — you can run it directly.';
        if (verdict.caveats?.length) {
          t += `\n\n**Still worth knowing:**\n${verdict.caveats.map(c => `• ${c}`).join('\n')}`;
        }
        return t;
      }
      return `**No built-in safe alternative, but you can reduce impact:**\n\n1. Set a lock_timeout so it fails fast rather than queueing indefinitely\n2. Monitor for long-running transactions before starting: check pg_stat_activity / sys.dm_exec_requests\n3. Schedule it in a low-traffic window\n4. Test on a staging replica to confirm the ${verdict.estDurationLabel} estimate holds for your hardware`;
    }

    function genRisks(verdict, tableSizeLabel, writesPerSec) {
      let t = `**Worst-case: ${tableSizeLabel} rows, ${fmtNum(writesPerSec)}/sec writes**\n\n`;
      if (verdict.caveats?.length) {
        t += `Known caveats for this rule:\n${verdict.caveats.map(c => `• ${c}`).join('\n')}\n\n`;
      }
      if (verdict.blocksWrites || verdict.blocksReads) {
        t += `At ${fmtNum(writesPerSec)}/sec, every second of lock time queues ${fmtNum(writesPerSec)} write operations. `;
        t += `Those writes time out, the errors cascade into the application tier, and connection pools saturate — the classic "DDL thundering herd."\n\n`;
        t += `**Safeguards:**\n`;
        t += `1. SET lock_timeout = '5s' — fail fast instead of blocking indefinitely\n`;
        t += `2. SET statement_timeout as a secondary safety net\n`;
        t += `3. Check for long-running transactions immediately before running\n`;
        t += `4. Alert on connection pool saturation during the operation`;
      } else if (verdict.rewritesTable) {
        t += `The rebuild runs online, but watch for:\n`;
        t += `• I/O spike during the rebuild can slow all queries on the same host\n`;
        t += `• You need ~1× table size in free disk space for the shadow copy\n`;
        t += `• A failure mid-way means a full retry from scratch — no partial progress`;
      } else {
        t += `This is a ${verdict.severity} operation. The main risk is the brief lock queueing behind a long-lived transaction — a transaction open for hours will make this DDL wait, and while it waits, every query behind it waits too.\n\n`;
        t += `Check for long-running queries before running and pick a quiet moment.`;
      }
      return t;
    }

    /* ---------------- chat message renderer ---------------- */
    function MsgText({ text }) {
      return (
        <div className="space-y-0.5">
          {text.split('\n').map((line, i) => {
            if (line === '') return <div key={i} className="h-1.5" />;
            const parts = line.split(/(\*\*[^*]+\*\*)/g);
            return (
              <p key={i} className="leading-relaxed">
                {parts.map((p, j) =>
                  p.startsWith('**') && p.endsWith('**')
                    ? <strong key={j}>{p.slice(2, -2)}</strong>
                    : p
                )}
              </p>
            );
          })}
        </div>
      );
    }

    /* ---------------- chat panel ---------------- */
    function ChatPanel({ verdict, engine, version, edition, operationLabel, tableMillions, writesPerSec, onClose, expanded, onToggleExpand }) {
      const engLabel = ENGINES.find(e => e.value === engine)?.label || engine;
      const sev = SEV[verdict.severity] || SEV.caution;
      const tableSizeLabel = fmtRows(tableMillions * 1e6) + ' rows';
      const introText = `This verdict comes from an auditable rules knowledge base grounded in official ${engLabel} documentation — no AI guessing. Use the quick actions below to go deeper on any angle.`;

      const [msgs, setMsgs] = useState([{ id: 0, role: 'assistant', text: introText }]);
      const [busy, setBusy]   = useState(false);
      const scrollRef = useRef(null);
      const atMenu = msgs.length === 1;

      useEffect(() => {
        const el = scrollRef.current;
        if (el) el.scrollTop = el.scrollHeight;
      }, [msgs, busy]);

      function ask(userText, genFn) {
        if (busy) return;
        setBusy(true);
        const uid = Date.now();
        setMsgs(m => [...m, { id: uid, role: 'user', text: userText }]);
        setTimeout(() => {
          setMsgs(m => [...m, { id: uid + 1, role: 'assistant', text: genFn() }]);
          setBusy(false);
        }, 280);
      }

      function backToMenu() {
        if (busy) return;
        setMsgs([{ id: Date.now(), role: 'assistant', text: introText }]);
      }

      return (
        <div className="flex flex-col h-full bg-white dark:bg-slate-900 rounded-2xl overflow-hidden">

          {/* header */}
          <div className="flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shrink-0">
            <span className="text-sm font-bold text-slate-800 dark:text-slate-100">💬 Migration Advisor</span>
            <div className="flex items-center gap-2">
              <button onClick={onToggleExpand}
                aria-label={expanded ? 'Collapse to corner' : 'Pop out to full view'}
                title={expanded ? 'Collapse' : 'Pop out'}
                className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-700">
                {expanded ? (
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M5 1v4H1M8 1v4h4M5 12v-4H1M8 12v-4h4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : (
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M1 1h4M1 1v4M9 1h3v3M1 9v3h3M12 9v3h-3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </button>
              <button onClick={onClose} aria-label="Close advisor"
                className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors p-1 rounded-md hover:bg-slate-100 dark:hover:bg-slate-700">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                  <path d="M1.5 1.5l10 10M11.5 1.5l-10 10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          {/* context chip */}
          <div className="px-4 py-2 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0 flex flex-wrap items-center gap-1.5">
            <span className="text-sm leading-none">{sev.emoji}</span>
            <span className={`text-xs font-bold ${sev.text}`}>{sev.label}</span>
            <span className="text-xs text-slate-300 dark:text-slate-600">·</span>
            <span className="text-xs font-medium text-slate-600 dark:text-slate-300">
              {engLabel} {version}{engine === 'sqlserver' ? ` (${edition})` : ''}
            </span>
            <span className="text-xs text-slate-300 dark:text-slate-600">·</span>
            <span className="text-xs text-slate-500 dark:text-slate-400 truncate max-w-[160px]">{operationLabel}</span>
          </div>

          {/* messages */}
          <div ref={scrollRef} className="chat-msgs flex-1 overflow-y-auto px-4 py-3 space-y-2.5 min-h-0">
            {msgs.map(msg => (
              <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[92%] rounded-2xl px-3.5 py-2.5 text-xs
                  ${msg.role === 'user'
                    ? 'bg-brand text-white rounded-br-none'
                    : 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-200 rounded-bl-none'}`}>
                  <MsgText text={msg.text} />
                </div>
              </div>
            ))}
            {busy && (
              <div className="flex justify-start">
                <div className="bg-slate-100 dark:bg-slate-800 rounded-2xl rounded-bl-none px-4 py-3">
                  <span className="text-slate-400 text-base tracking-[0.3em]">···</span>
                </div>
              </div>
            )}
          </div>

          {/* action buttons */}
          <div className="px-3 pt-2 pb-3 space-y-1.5 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shrink-0">
            {[
              {
                label: '🔍 Why does it lock?',
                gen: () => genLockExplanation(verdict, operationLabel, engLabel, version),
              },
              {
                label: '🛡️ How to do it safely?',
                gen: () => genSafeAlternative(verdict, tableSizeLabel),
              },
              {
                label: '⚠️ What can go wrong?',
                gen: () => genRisks(verdict, tableSizeLabel, writesPerSec),
              },
            ].map(({ label, gen }) => (
              <button key={label} disabled={busy} onClick={() => ask(label, gen)}
                className="w-full text-left rounded-xl border border-slate-200 dark:border-slate-700 px-3 py-2 text-xs font-medium text-slate-600 dark:text-slate-300
                  hover:border-brand hover:text-brand dark:hover:border-red-400 dark:hover:text-red-400
                  disabled:opacity-40 transition-colors">
                {label}
              </button>
            ))}

            {atMenu ? (
              <a href="https://buymeacoffee.com/gsupaek" target="_blank" rel="noopener noreferrer"
                className="flex items-center justify-center gap-2 w-full rounded-xl border border-yellow-300 bg-yellow-50
                  dark:border-yellow-700 dark:bg-yellow-900/20
                  px-3 py-2 text-xs font-semibold text-yellow-700 dark:text-yellow-400
                  hover:bg-yellow-100 dark:hover:bg-yellow-900/40 transition-colors">
                ☕ Buy me a coffee
              </a>
            ) : (
              <button disabled={busy} onClick={backToMenu}
                className="w-full text-left rounded-xl border border-slate-200 dark:border-slate-700 px-3 py-2 text-xs font-medium text-slate-500 dark:text-slate-400
                  hover:border-slate-400 hover:text-slate-700 dark:hover:border-slate-500 dark:hover:text-slate-200
                  disabled:opacity-40 transition-colors">
                ← Back to main menu
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ---------------- lock matrix data ---------------- */
    const MATRIX_COLS = [
      { key: 'pg10',     engine: 'postgres',  label: 'PG ≤10'     },
      { key: 'pg11',     engine: 'postgres',  label: 'PG 11–12'   },
      { key: 'pg13',     engine: 'postgres',  label: 'PG 13–14'   },
      { key: 'pg15',     engine: 'postgres',  label: 'PG 15+'     },
      { key: 'my57',     engine: 'mysql',     label: 'MySQL 5.7'  },
      { key: 'my80',     engine: 'mysql',     label: 'MySQL 8.0'  },
      { key: 'my81',     engine: 'mysql',     label: 'MySQL 8.1+' },
      { key: 'mssqlstd', engine: 'sqlserver', label: 'MSSQL Std'  },
      { key: 'mssqlent', engine: 'sqlserver', label: 'MSSQL Ent'  },
    ];

    const SRC = {
      PG_ALTER:    { l: 'PG ALTER TABLE docs',    u: 'https://www.postgresql.org/docs/current/sql-altertable.html' },
      PG11_NOTES:  { l: 'PG 11 release notes',    u: 'https://www.postgresql.org/docs/11/release-11.html' },
      MY8_ONLINE:  { l: 'MySQL 8.0 online DDL',   u: 'https://dev.mysql.com/doc/refman/8.0/en/innodb-online-ddl-operations.html' },
      MY57_ONLINE: { l: 'MySQL 5.7 online DDL',   u: 'https://dev.mysql.com/doc/refman/5.7/en/innodb-online-ddl-operations.html' },
      MSSQL_ALTER: { l: 'MSSQL ALTER TABLE docs', u: 'https://learn.microsoft.com/en-us/sql/t-sql/statements/alter-table-transact-sql' },
      MSSQL_IDX:   { l: 'MSSQL CREATE INDEX',     u: 'https://learn.microsoft.com/en-us/sql/t-sql/statements/create-index-transact-sql' },
      XATA_BLOG:   { l: 'Xata Engineering Blog',  u: null },
      BYTEBASE:    { l: 'Bytebase Blog',           u: null },
      PGROLL:      { l: 'pgroll (xataio)',          u: null },
    };

    function mcell(sev, rewrite, lock, note, srcs = []) {
      return { sev, rewrite, lock, note, srcs };
    }
    const ms = (note, lock, srcs = [])          => mcell('safe',    false, lock, note, srcs);
    const mw = (note, lock, rw = false, srcs=[])=> mcell('caution', rw,   lock, note, srcs);
    const md = (note, lock, rw = true,  srcs=[])=> mcell('danger',  rw,   lock, note, srcs);

    const MATRIX_ROWS = [
      {
        op: 'Add column — nullable',
        key: 'add_col_null',
        cells: {
          pg10:     ms('Catalog-only — instant at any size',                           'ACCESS EXCLUSIVE (brief)', [SRC.PG_ALTER]),
          pg11:     ms('Catalog-only',                                                 'ACCESS EXCLUSIVE (brief)', [SRC.PG_ALTER]),
          pg13:     ms('Catalog-only',                                                 'ACCESS EXCLUSIVE (brief)', [SRC.PG_ALTER]),
          pg15:     ms('Catalog-only',                                                 'ACCESS EXCLUSIVE (brief)', [SRC.PG_ALTER]),
          my57:     mw('INPLACE rebuild — reads continue, writes queue at swap',       'metadata + INPLACE rebuild', true,  [SRC.MY57_ONLINE]),

    /* ---------------- LockMatrix component ---------------- */
    function LockMatrix() {
      const ALL_ENGINES = ['postgres', 'mysql', 'sqlserver'];
      const ENG_LABELS  = { postgres: 'PostgreSQL', mysql: 'MySQL', sqlserver: 'SQL Server' };
      const [active, setActive] = useState(new Set(ALL_ENGINES));

      function toggleEngine(eng) {
        setActive(prev => {
          const next = new Set(prev);
          if (next.has(eng)) { if (next.size > 1) next.delete(eng); }
          else next.add(eng);
          return next;
        });
      }

      const visibleCols = MATRIX_COLS.filter(c => active.has(c.engine));
      const engColSpans = ALL_ENGINES
        .filter(e => active.has(e))
        .map(e => ({ eng: e, span: MATRIX_COLS.filter(c => c.engine === e).length }));

      return (
        <section className="mt-12">
          <div className="mb-4 flex flex-wrap items-end justify-between gap-3">
            <div>
              <h2 className="text-lg font-extrabold text-slate-800 dark:text-slate-100">Version Lock Matrix</h2>
              <p className="mt-0.5 text-xs text-slate-500 dark:text-slate-400">How lock behaviour changes across engine versions — every cell cites its source</p>
            </div>
            <div className="flex items-center gap-2">
              {ALL_ENGINES.map(eng => (
                <button key={eng} onClick={() => toggleEngine(eng)}
                  className={`rounded-full border px-3 py-1 text-xs font-semibold transition-colors
                    ${active.has(eng)
                      ? 'border-brand bg-brand text-white'
                      : 'border-slate-200 bg-white text-slate-500 hover:border-slate-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-400'}`}>
                  {ENG_LABELS[eng]}
                </button>
              ))}
            </div>
          </div>

          <div className="rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-x-auto">
            <table className="w-full min-w-max border-collapse text-xs">
              <thead>
                <tr className="bg-slate-50 dark:bg-slate-800/70">
                  <th className="sticky left-0 z-10 bg-slate-50 dark:bg-slate-800/70 px-4 py-2.5 text-left text-[11px] font-semibold text-slate-500 dark:text-slate-400 min-w-[200px] border-b border-slate-200 dark:border-slate-700">Operation</th>
                  {engColSpans.map(({ eng, span }, i) => (
                    <th key={eng} colSpan={span}
                      className={`px-2 py-2.5 text-center text-[11px] font-bold text-slate-700 dark:text-slate-100 border-b border-slate-200 dark:border-slate-700
                        ${i > 0 ? 'border-l border-slate-200 dark:border-slate-700' : ''}`}>
                      {ENG_LABELS[eng]}
                    </th>
                  ))}
                </tr>
                <tr className="bg-slate-50/80 dark:bg-slate-800/50 border-b-2 border-slate-200 dark:border-slate-700">
                  <th className="sticky left-0 z-10 bg-slate-50/80 dark:bg-slate-800/50 px-4 py-1.5" />
                  {visibleCols.map((col, i) => {
                    const firstInGroup = i === 0 || visibleCols[i-1].engine !== col.engine;
                    return (
                      <th key={col.key}
                        className={`px-3 py-1.5 text-center text-[10px] font-semibold text-slate-400 dark:text-slate-500 whitespace-nowrap
                          ${firstInGroup ? 'border-l border-slate-200 dark:border-slate-700' : ''}`}>
                        {col.label}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {MATRIX_ROWS.map((row, ri) => {
                  const isEven = ri % 2 === 0;
                  const rowBg  = isEven ? 'bg-white dark:bg-slate-900' : 'bg-slate-50/60 dark:bg-slate-800/25';
                  return (
                    <tr key={row.key} className={`${rowBg} border-b border-slate-100 dark:border-slate-800 last:border-b-0`}>
                      <td className={`sticky left-0 z-10 ${rowBg} px-4 py-3 font-semibold text-[11px] text-slate-700 dark:text-slate-200 leading-snug`}>
                        {row.op}
                      </td>
                      {visibleCols.map((col, i) => {
                        const cell = row.cells[col.key];
                        const firstInGroup = i === 0 || visibleCols[i-1].engine !== col.engine;
                        if (!cell) return (
                          <td key={col.key} className={`px-3 py-3 text-center text-slate-300 dark:text-slate-600 ${firstInGroup ? 'border-l border-slate-200 dark:border-slate-700' : ''}`}>—</td>
                        );
                        const sev = SEV[cell.sev] || SEV.caution;
                        const withLinks = cell.srcs.filter(s => s.u);
                        const withNames = cell.srcs.filter(s => !s.u);
                        return (
                          <td key={col.key} className={`px-2.5 py-2.5 align-top ${firstInGroup ? 'border-l border-slate-200 dark:border-slate-700' : ''}`}>
                            <div className="flex items-start gap-1.5">
                              <span className="text-sm leading-none mt-px shrink-0">{sev.emoji}</span>
                              <div className="min-w-0">
                                <p className={`text-[10px] font-bold leading-tight ${sev.text}`}>{cell.lock}</p>
                                <p className="mt-0.5 text-[10px] text-slate-500 dark:text-slate-400 leading-snug">{cell.note}</p>
                                {cell.rewrite && (
                                  <span className="mt-1 inline-block text-[9px] font-semibold bg-risk/10 text-risk dark:bg-risk/20 dark:text-red-400 px-1.5 py-0.5 rounded">rewrites table</span>
                                )}
                                {(withLinks.length > 0 || withNames.length > 0) && (
                                  <div className="mt-1.5 flex flex-wrap gap-x-2 gap-y-0.5">
                                    {withLinks.map((s, si) => (
                                      <a key={si} href={s.u} target="_blank" rel="noopener noreferrer"

                                    ))}
                                    {withNames.map((s, si) => (
                                      <span key={si} className="text-[9px] italic text-slate-400 dark:text-slate-500">{s.l}</span>
                                    ))}
                                  </div>
                                )}
                              </div>
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="mt-3 flex flex-wrap items-center gap-4 text-[10px] text-slate-400 dark:text-slate-500">
            {Object.entries(SEV).map(([k, v]) => (
              <span key={k} className="flex items-center gap-1">{v.emoji} {v.label}</span>
            ))}
            <span>· <strong className="text-risk">rewrites table</strong> = full physical copy required (duration scales with row count)</span>
          </div>
        </section>
      );
    }

          </div>
          <p className="mt-3 text-[10px] text-slate-400 dark:text-slate-500">
            Timing estimates assume 250k rows/sec for table rewrites, 500k rows/sec for index builds. Benchmark on a staging replica before production.
          </p>
        </section>
      );
    }

    /* ---------------- tooltip ---------------- */
    function InfoTip({ children, why, align = 'center' }) {
      const pos = align === 'right' ? 'right-0' : align === 'left' ? 'left-0' : 'left-1/2 -translate-x-1/2';
      return (
        <span className="group relative inline-flex align-middle">
          <button type="button" aria-label="More information"
            className="ml-1 inline-flex h-4 w-4 items-center justify-center rounded-full border border-slate-300 text-[10px] font-bold leading-none text-slate-400 transition-colors hover:border-brand hover:text-brand focus:outline-none focus-visible:ring-2 focus-visible:ring-brand/40 dark:border-slate-600 dark:text-slate-400 dark:hover:border-brand dark:hover:text-red-400">i</button>
          <span role="tooltip" className={`pointer-events-none absolute bottom-full ${pos} z-50 mb-2 w-64 rounded-lg bg-slate-800 px-3 py-2.5 text-left text-xs font-normal leading-relaxed text-white opacity-0 shadow-xl ring-1 ring-black/5 transition-opacity duration-150 group-hover:opacity-100 group-focus-within:opacity-100 dark:bg-slate-700`}>
            {children}
            {why && <span className="mt-1.5 block border-t border-white/15 pt-1.5"><span className="font-semibold text-red-300">Why it matters: </span>{why}</span>}
          </span>
        </span>
      );
    }

    function Field({ label, tip, why, children }) {
      return (
        <div className="mb-5">
          <label className="mb-1.5 block text-sm font-medium text-slate-700 dark:text-slate-200">
            {label}{tip && <InfoTip why={why}>{tip}</InfoTip>}
          </label>
          {children}
        </div>
      );
    }

    function Select({ value, onChange, options, ariaLabel }) {
      return (
        <select value={value} onChange={(e) => onChange(e.target.value)} aria-label={ariaLabel}
          className="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/30 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100">
          {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
        </select>
      );
    }

    function Segmented({ value, options, onChange, ariaLabel }) {
      return (
        <div role="radiogroup" aria-label={ariaLabel} className="grid gap-1.5 rounded-lg bg-slate-100 p-1 dark:bg-slate-700/60"
             style={{ gridTemplateColumns: `repeat(${options.length}, minmax(0,1fr))` }}>
          {options.map((opt) => {
            const active = value === opt.value;
            return (
              <button key={opt.value} type="button" role="radio" aria-checked={active} onClick={() => onChange(opt.value)}
                className={`rounded-md px-2 py-1.5 text-sm font-medium transition-all ${active ? 'bg-white text-brand shadow-sm dark:bg-slate-900 dark:text-red-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200'}`}>
                {opt.label}
              </button>
            );
          })}
        </div>
      );
    }

    function Slider({ value, min, max, step, onChange, display, ariaLabel }) {
      return (
        <div>
          <div className="mb-1.5 flex justify-end">
            <span className="text-sm font-semibold text-brand tabular-nums dark:text-red-400">{display}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value} aria-label={ariaLabel}
            onChange={(e) => onChange(Number(e.target.value))} />
        </div>
      );
    }

    function Badge({ active, onText, offText, danger = true }) {
      const cls = active
        ? (danger ? 'bg-risk/15 text-risk dark:text-red-300' : 'bg-warning/15 text-yellow-700 dark:text-yellow-300')
        : 'bg-success/15 text-success dark:text-green-300';
      return <span className={`inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-xs font-semibold ${cls}`}>{active ? onText : offText}</span>;
    }

    /* ---------------- engine loader hook ---------------- */
    function useEngine() {
      const [engine, setEngine] = useState(() => window.MigrationEngine || null);
      const [error, setError]   = useState(() => window.MigrationEngineError || null);
      useEffect(() => {
        if (engine || error) return;
        const ready = () => setEngine(window.MigrationEngine);
        const fail  = () => setError(window.MigrationEngineError || 'Failed to load the rules engine.');
        window.addEventListener('engine:ready', ready);
        window.addEventListener('engine:error', fail);
        if (window.MigrationEngine) setEngine(window.MigrationEngine);
        else if (window.MigrationEngineError) setError(window.MigrationEngineError);
        return () => { window.removeEventListener('engine:ready', ready); window.removeEventListener('engine:error', fail); };
      }, [engine, error]);
      return { engine, error };
    }

    /* ---------------- verdict view ---------------- */
    function Verdict({ verdict, copied, onCopy }) {
      const sev = SEV[verdict.severity] || SEV.caution;
      return (
        <div className="space-y-5">
          {/* headline */}
          <div className={`pop rounded-2xl border p-5 ${sev.card}`}>
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <span className="text-3xl leading-none" aria-hidden="true">{sev.emoji}</span>
                <div>
                  <p className={`text-xl font-extrabold ${sev.text}`}>{sev.label}</p>
                  <p className="text-sm font-medium text-slate-500 dark:text-slate-400">
                    Lock: <span className="font-semibold text-slate-700 dark:text-slate-200">{verdict.lockType}</span>
                    <InfoTip align="left" why="The lock type determines what other queries must wait for. An ACCESS EXCLUSIVE or Sch-M lock is the worst case — it blocks everything.">The database lock this operation acquires.</InfoTip>
                  </p>
                </div>
              </div>
              <div className="text-right">
                <p className="text-xs font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">Est. duration
                  <InfoTip align="right" why="Order-of-magnitude only, from table size ÷ a fixed throughput assumption. A metadata-only change is 'instant' regardless of size.">Rough time the operation will take.</InfoTip>
                </p>
                <p className="text-2xl font-extrabold tabular-nums text-slate-800 dark:text-slate-100">{verdict.estDurationLabel}</p>
              </div>
            </div>

            {/* badges */}
            <div className="mt-4 flex flex-wrap gap-2">
              <Badge active={verdict.blocksReads}  onText="Blocks reads"   offText="Reads OK" />
              <Badge active={verdict.blocksWrites} onText="Blocks writes"  offText="Writes OK" />
              <Badge active={verdict.rewritesTable} onText="Rewrites table" offText="No table rewrite" />
            </div>
          </div>

          {/* explanation */}
          <div className="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <p className="text-sm leading-relaxed text-slate-700 dark:text-slate-200">{verdict.explanation}</p>
          </div>

          {/* safe alternative */}
          {verdict.safeAlternative && (
            <div className="rounded-2xl border border-brand/20 bg-brand/5 p-5 dark:border-brand/40 dark:bg-brand/10">
              <div className="mb-2 flex items-center gap-2">
                <span className="flex h-7 w-7 items-center justify-center rounded-full bg-brand text-sm font-bold text-white">✓</span>
                <h3 className="text-sm font-bold text-slate-800 dark:text-slate-100">Safer alternative: {verdict.safeAlternative.title}</h3>
              </div>
              <ol className="ml-9 list-decimal space-y-1 text-sm text-slate-700 dark:text-slate-200">
                {verdict.safeAlternative.steps.map((s, i) => <li key={i}>{s}</li>)}
              </ol>
              {verdict.safeAlternative.estLockLabel && (
                <p className="ml-9 mt-2 text-xs font-semibold text-success dark:text-green-400">Lock impact: {verdict.safeAlternative.estLockLabel}</p>
              )}
            </div>
          )}

          {/* caveats */}
          {verdict.caveats && verdict.caveats.length > 0 && (
            <div className="space-y-2">
              {verdict.caveats.map((c, i) => (
                <div key={i} className="flex items-start gap-2 rounded-lg border border-warning/40 bg-warning/10 px-3.5 py-2.5 text-sm font-medium text-yellow-700 dark:bg-warning/15 dark:text-yellow-300">
                  <span aria-hidden="true">⚠️</span><span>{c}</span>
                </div>
              ))}
            </div>
          )}

          {/* why? / sources */}
          <details className="rounded-2xl border border-slate-200 bg-white px-5 py-3 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <summary className="cursor-pointer text-sm font-semibold text-slate-600 hover:text-brand dark:text-slate-300 dark:hover:text-red-400">Why? (sources &amp; matched rule)</summary>
            <div className="mt-3 space-y-2 text-xs text-slate-500 dark:text-slate-400">
              <p><span className="font-semibold text-slate-600 dark:text-slate-300">Matched rule:</span> <code className="rounded bg-slate-100 px-1.5 py-0.5 dark:bg-slate-700">{verdict.matchedRuleId || 'none (fallback)'}</code></p>
              {verdict.citations && verdict.citations.length > 0 ? (
                <ul className="list-disc space-y-1 pl-5">{verdict.citations.map((c, i) => <li key={i}>{c}</li>)}</ul>
              ) : <p>No citations recorded for this rule yet.</p>}
            </div>
          </details>

          <div className="flex justify-end">
            <button onClick={onCopy} className="rounded-lg border border-slate-200 px-3.5 py-2 text-xs font-semibold text-slate-600 transition-colors hover:border-brand hover:text-brand dark:border-slate-600 dark:text-slate-300 dark:hover:text-red-400">
              {copied ? '✓ Copied' : 'Copy verdict'}
            </button>
          </div>

          <p className="text-center text-xs text-slate-400 dark:text-slate-500">
            Estimates are order-of-magnitude; benchmark on a staging replica before production.
          </p>
        </div>
      );
    }

    /* ---------------- app ---------------- */
    function App() {
      const { engine, error } = useEngine();
      const [dark, setDark] = useState(() => document.documentElement.classList.contains('dark'));

      const [engineName,   setEngineName]   = useState('sqlserver');
      const [version,      setVersion]      = useState('2022');
      const [operation,    setOperation]    = useState('create_index');
      const [tableMillions, setTableMillions] = useState(50);
      const [writesPerSec, setWritesPerSec] = useState(2000);
      const [edition,      setEdition]      = useState('standard');
      const [copied,       setCopied]       = useState(false);
      const [chatOpen,     setChatOpen]     = useState(false);
      const [chatExpanded, setChatExpanded] = useState(false);
      const [visitCount,   setVisitCount]   = useState(() => window.VisitCount ?? null);

      // keep version valid for the selected engine
      useEffect(() => {
        if (!VERSIONS[engineName].includes(version)) setVersion(VERSIONS[engineName][0]);
      }, [engineName]); // eslint-disable-line

      // pick up visitor count whenever Supabase fires
      useEffect(() => {
        if (visitCount !== null) return;
        const h = () => setVisitCount(window.VisitCount ?? null);
        window.addEventListener('visits:ready', h);
        if (window.VisitCount != null) setVisitCount(window.VisitCount);
        return () => window.removeEventListener('visits:ready', h);
      }, [visitCount]);

      const toggleTheme = useCallback(() => {
        setDark((d) => {
          const next = !d;
          document.documentElement.classList.toggle('dark', next);
          try { localStorage.setItem('mre-theme', next ? 'dark' : 'light'); } catch (e) {}
          return next;
        });
      }, []);

      const verdict = useMemo(() => {
        if (!engine) return null;
        return engine.resolveVerdict(
          { engine: engineName, version, operation,
            context: { tableSizeRows: tableMillions * 1_000_000, writesPerSec,
                       edition: engineName === 'sqlserver' ? edition : null, onlineFlag: null } },
          engine.rules, { onCollision: () => {} }
        );
      }, [engine, engineName, version, operation, tableMillions, writesPerSec, edition]);

      const copyVerdict = useCallback(() => {
        if (!verdict) return;
        const opLabel  = (OPERATIONS.find((o) => o[0] === operation) || [, operation])[1];
        const engLabel = (ENGINES.find((e) => e.value === engineName) || {}).label;
        const text =
`WILL IT LOCK? — ${SEV[verdict.severity].label.toUpperCase()}
${engLabel} ${version}${engineName === 'sqlserver' ? ' (' + edition + ')' : ''} — ${opLabel}
Table: ${fmtRows(tableMillions * 1e6)} rows
--------------------------------
Lock type:      ${verdict.lockType}
Blocks reads:   ${verdict.blocksReads ? 'YES' : 'no'}
Blocks writes:  ${verdict.blocksWrites ? 'YES' : 'no'}
Rewrites table: ${verdict.rewritesTable ? 'YES' : 'no'}
Est. duration:  ${verdict.estDurationLabel}
--------------------------------
${verdict.explanation}` +
(verdict.safeAlternative ? `\n\nSafer alternative — ${verdict.safeAlternative.title}:\n` + verdict.safeAlternative.steps.map((s, i) => `  ${i + 1}. ${s}`).join('\n') : '') +
`\n\nEstimated with "Will It Lock?". Order-of-magnitude only — benchmark before production.`;
        navigator.clipboard.writeText(text).catch(() => {});
        setCopied(true); setTimeout(() => setCopied(false), 1800);
      }, [verdict, engineName, version, operation, tableMillions, edition]);

      const operationLabel = (OPERATIONS.find(o => o[0] === operation) || [, operation])[1];

      // key resets ChatPanel internal state when the verdict selection changes
      const chatKey = `${engineName}:${version}:${operation}:${edition}`;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100">
          <header className="border-b border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800">
            <div className="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-5 sm:px-6">
              <div className="flex items-center gap-3">
                <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-brand text-lg font-extrabold text-white">🔒</div>
                <div>
                  <h1 className="text-lg font-extrabold leading-tight sm:text-xl">Will It Lock?</h1>
                  <p className="text-xs text-slate-500 dark:text-slate-400">Know exactly what a schema change does to <em>your</em> table — before you run it.</p>
                </div>
              </div>
              <button onClick={toggleTheme} aria-label="Toggle dark mode" title={dark ? 'Switch to light mode' : 'Switch to dark mode'}
                className="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-200 text-slate-500 transition-colors hover:border-brand hover:text-brand dark:border-slate-600 dark:text-slate-300 dark:hover:text-red-400">
                {dark ? '☀' : '🌙'}
              </button>
            </div>
          </header>

          <main className="mx-auto max-w-6xl px-4 py-6 sm:px-6">
            {error ? (
              <div className="rounded-2xl border border-risk/40 bg-risk/5 p-6 text-sm text-risk dark:bg-risk/10 dark:text-red-300">
                <p className="font-bold">Couldn't load the rules engine.</p>
                <p className="mt-1">{error}</p>
                <p className="mt-3 text-slate-600 dark:text-slate-300">This page loads <code>rules.json</code> and the engine modules over HTTP, so it must be <strong>served</strong>, not opened directly from disk. Run <code className="rounded bg-slate-100 px-1.5 py-0.5 dark:bg-slate-700">python -m http.server</code> in this folder, or view it on GitHub Pages.</p>
              </div>
            ) : !engine || !verdict ? (
              <div className="flex items-center justify-center py-24 text-slate-400 dark:text-slate-500">Loading rules engine…</div>
            ) : (
              <div className="grid gap-6 lg:grid-cols-[minmax(0,1fr)_minmax(0,1.3fr)]">
                {/* INPUTS */}
                <section className="h-fit rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-800 sm:p-6">
                  <h2 className="mb-4 text-base font-bold">Your operation</h2>

                  <Field label="Database engine" tip="The engine you're migrating on." why="Lock behaviour differs hugely between engines — the same DDL can be instant on one and a full rewrite on another.">
                    <Segmented value={engineName} onChange={setEngineName} ariaLabel="Database engine"
                      options={ENGINES.map((e) => ({ value: e.value, label: e.label }))} />
                  </Field>

                  <Field label="Version" tip="The major version of the engine." why="Lock behaviour changes across versions — e.g. Postgres 11 made constant-default column adds instant, and MySQL 8.0 added INSTANT DDL.">
                    <Select value={version} onChange={setVersion} ariaLabel="Version"
                      options={VERSIONS[engineName].map((v) => [v, v])} />
                  </Field>

                  <Field label="Operation" tip="The DDL change you plan to run." why="This is the single biggest driver of whether the table locks — and the whole point of checking before you ship.">
                    <Select value={operation} onChange={setOperation} ariaLabel="Operation" options={OPERATIONS} />
                  </Field>

                  {engineName === 'sqlserver' && (
                    <Field label="SQL Server edition" tip="Standard or Enterprise." why="ONLINE=ON index builds are Enterprise-only. On Standard, the same CREATE INDEX takes a Sch-M lock that blocks reads and writes — the classic edition trap.">
                      <Segmented value={edition} onChange={setEdition} ariaLabel="SQL Server edition"
                        options={[{ value: 'standard', label: 'Standard' }, { value: 'enterprise', label: 'Enterprise' }]} />
                    </Field>
                  )}

                  <Field label="Table size" tip="Approximate row count of the target table." why="Size doesn't change whether a lock is taken — but it drives how long a rewrite or index build holds that lock. A metadata-only change is instant at any size.">
                    <Slider value={tableMillions} min={0} max={1000} step={1} onChange={setTableMillions}
                      ariaLabel="Table size in millions of rows" display={`${fmtRows(tableMillions * 1e6)} rows`} />
                  </Field>

                  <Field label="Writes per second" tip="Write throughput hitting this table." why="High write rates make even a short lock painful — every blocked write queues up and can cascade into timeouts across your app.">
                    <Slider value={writesPerSec} min={0} max={10000} step={50} onChange={setWritesPerSec}
                      ariaLabel="Writes per second" display={`${fmtNum(writesPerSec)}/sec`} />
                  </Field>
                </section>

                {/* VERDICT */}
                <section className="fade-in">
                  <Verdict verdict={verdict} copied={copied} onCopy={copyVerdict} />
                </section>
              </div>
            )}

            {/* matrix + scenarios — always shown, independent of verdict state */}
            <LockMatrix />
            <Scenarios />

            {/* footer */}
            <footer className="mt-10 border-t border-slate-200 dark:border-slate-700">
              <div className="pt-5 pb-3">
                {/* visitor counter */}
                <p className="text-xs text-slate-400 dark:text-slate-500">
                  {visitCount != null
                    ? <span>👁 <strong className="text-slate-500 dark:text-slate-400">{visitCount.toLocaleString()}</strong> visitors</span>
                    : null}
                </p>
              </div>
              <p className="pb-5 text-center text-xs text-slate-400 dark:text-slate-500">
                Verdicts come from an auditable rules knowledge base (<code>rules.json</code>) — no AI guessing, no external calls. Everything runs in your browser.
              </p>
            </footer>
          </main>

          {/* floating chat — modal (expanded) mode */}
          {verdict && chatOpen && chatExpanded && (
            <div
              className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-10 bg-black/50 backdrop-blur-sm"
              onClick={(e) => { if (e.target === e.currentTarget) { setChatOpen(false); setChatExpanded(false); } }}>
              <div className="w-full max-w-2xl rounded-2xl border border-slate-200 dark:border-slate-700 shadow-2xl overflow-hidden flex flex-col"
                style={{ height: 'min(82vh, 720px)' }}>
                <ChatPanel
                  key={chatKey}
                  verdict={verdict}
                  engine={engineName}
                  version={version}
                  edition={edition}
                  operationLabel={operationLabel}
                  tableMillions={tableMillions}
                  writesPerSec={writesPerSec}
                  expanded={true}
                  onToggleExpand={() => setChatExpanded(false)}
                  onClose={() => { setChatOpen(false); setChatExpanded(false); }}
                />
              </div>
            </div>
          )}

          {/* floating chat — corner pill + compact panel */}
          {verdict && (
            <div className="fixed bottom-6 right-5 z-50 flex flex-col items-end gap-3">
              {/* compact panel — hidden when modal is active */}
              {!chatExpanded && (
                <div
                  className={`w-80 sm:w-[22rem] rounded-2xl border border-slate-200 dark:border-slate-700 shadow-2xl overflow-hidden
                    transition-all duration-200 origin-bottom-right
                    ${chatOpen ? 'opacity-100 scale-100 translate-y-0' : 'opacity-0 scale-95 translate-y-3 pointer-events-none'}`}
                  style={{ height: '520px' }}>
                  <ChatPanel
                    key={chatKey}
                    verdict={verdict}
                    engine={engineName}
                    version={version}
                    edition={edition}
                    operationLabel={operationLabel}
                    tableMillions={tableMillions}
                    writesPerSec={writesPerSec}
                    expanded={false}
                    onToggleExpand={() => setChatExpanded(true)}
                    onClose={() => setChatOpen(false)}
                  />
                </div>
              )}

              {/* toggle pill — hidden when modal is open */}
              {!chatExpanded && (
                <button
                  onClick={() => setChatOpen(o => !o)}
                  className={`flex items-center gap-2 rounded-full px-5 py-3 text-sm font-bold text-white shadow-lg transition-all
                    ${chatOpen ? 'bg-slate-700 hover:bg-slate-600' : 'bg-brand hover:bg-brandDark'}`}
                  aria-label={chatOpen ? 'Close advisor' : 'Open migration advisor'}>
                  {chatOpen
                    ? <><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="white" strokeWidth="1.8" strokeLinecap="round"/></svg> Close</>
                    : <>💬 Explain this verdict</>}
                </button>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
